<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quantum Gong</title>
    <link rel="manifest" href="manifest.json?v=9">
    <style>
        body { 
            background: gold; /* Restored your bright gold background */
            color: #111111; /* FIXED: Dark charcoal text so it's perfectly visible */
            font-family: monospace; 
            text-align: center; 
            padding-top: 30vh; 
            margin: 0; 
            height: 100%;
            width: 100%;
            box-sizing: border-box; 
            position: absolute;
        }
        h1 { 
            font-size: 22px; 
            text-shadow: 0 0 1px rgba(0,0,0,0.2); 
            margin-bottom: 30px;
            color: #111111; /* Visible dark header */
        }
        .btn { 
            font-size: 1.3rem; 
            color: blue; /* Clear readable text */
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            padding: 15px 30px;
            border: 2px solid #111111; /* Clean dark border */
            border-radius: 4px;
            user-select: none;
            max-width: 80%;
            line-height: 1.6;
            margin: 10px;
            background: rgba(255, 255, 255, 0.3); /* Translucent background to pop from the gold */
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        /* Style for when the app is already installed and locked in the browser */
        .btn.locked {
            color: #006633;
            border-color: #006633;
            background: #ccffdd;
            cursor: not-allowed;
        }
        /* iOS Instruction Modal Overlay */
        #iosModal {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid black;
            width: 85%;
            box-shadow: 0 0 20px black;
            z-index: 999;
            text-align: left;
        }
        #iosModal h3 { margin: 0 0 10px 0; color: gold; text-align: center; }
        #iosModal button { 
            background: red; color: white; border: none; padding: 5px 10px; border-radius: 4px; float: right; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>⚛️ QUANTUM GONG ⚛️</h1>
    
    <div id="status" class="btn" onclick="handleInstallAction()">Tap to Connect & Listen</div>

    <div id="iosModal">
        <button onclick="closeIosModal()">X</button>
        <h3>iPhone Installation</h3>
        <p>1. Tap the <strong>Share</strong> button at the bottom of Safari (the square with an up arrow).</p>
        <p>2. Scroll down and select <strong>"Add to Home Screen"</strong>.</p>
    </div>

    <script>
        let deferredPrompt;
        let appInstalledDetermined = false;
        let isListening = false;
        const statusText = document.getElementById('status');
        const iosModal = document.getElementById('iosModal');

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        const TOPIC_NAME = "quantum_sangha_groupie";

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js?v=9');
          });
        }

        window.addEventListener('appinstalled', () => {
            appInstalledDetermined = true;
            lockBrowserInterface();
        });

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            if (!isStandalone && !appInstalledDetermined) {
                statusText.innerText = "Install Android App";
                statusText.style.color = "#0044cc";
                statusText.style.borderColor = "#0044cc";
                statusText.classList.remove('locked');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (isStandalone) {
                statusText.innerText = "Tap to Connect & Listen";
                statusText.style.color = "#111111";
                statusText.style.borderColor = "#111111";
            } else {
                setTimeout(() => {
                    if (!deferredPrompt && !isIOS) {
                        lockBrowserInterface();
                    } else if (isIOS) {
                        statusText.innerText = "Add to Home Screen (iOS)";
                        statusText.style.color = "#775500";
                        statusText.style.borderColor = "#775500";
                    }
                }, 1000); 
            }
        });

        function lockBrowserInterface() {
            statusText.innerText = "App Already Installed. Check Home Screen.";
            statusText.classList.add('locked');
            statusText.style.color = "green";
            statusText.style.borderColor = "#006633";
        }

        async function handleInstallAction() {
            if (isStandalone && !isListening) {
                const primeAudio = new Audio('./gong.mp3');
                primeAudio.play().then(() => {
                    primeAudio.pause();
                    startListening(); 
                }).catch(e => console.log("Audio prime failure:", e));
                return;
            }

            if (statusText.classList.contains('locked') || isStandalone) {
                return;
            }

            if (isIOS) {
                iosModal.style.display = "block";
            } else if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                if (outcome === 'accepted') {
                    lockBrowserInterface();
                }
            }
        }

        function closeIosModal() {
            iosModal.style.display = "none";
        }

        function startListening() {
            isListening = true;
            statusText.innerText = "Listening for Mindfulness Gong";
            statusText.style.color = "mediumvioletred";
            statusText.style.borderColor = "#006611";

            const eventSource = new EventSource(`https://ntfy.sh/${TOPIC_NAME}/sse`);
            
            eventSource.onmessage = () => {
                statusText.innerText = "Bell Rung";
                statusText.style.color = "black";
                statusText.style.borderColor = "#6600cc";

                setTimeout(() => {
                    statusText.innerText = "Listening for Mindfulness Gong";
                    statusText.style.color = "mediumvioletred";
                    statusText.style.borderColor = "#006611";
                }, 5000);
            };
        }
    </script>
</body>
</html>
