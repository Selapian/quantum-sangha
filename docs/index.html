<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumSangha</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #0d0d0d; 
            color: #00ff99; 
            font-family: monospace; 
            text-align: center; 
            padding-top: 30vh; 
            margin: 0; 
        }
        h1 { 
            font-size: 2.3rem; 
            text-shadow: 0 0 10px #00ff99; 
            margin-bottom: 30px;
        }
        #status { 
            font-size: 1.5rem; 
            color: #888; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            cursor: pointer;
            display: inline-block;
            padding: 10px 20px;
            border: 1px dashed #333;
        }
        #status.active {
            color: #00ff99;
            text-shadow: 0 0 10px #00ff99;
            border-color: #00ff99;
        }
    </style>
</head>
<body>

    <h1>⚛️ QUANTUM MINDSTREAM ⚛️</h1>
    
    <div id="status" onclick="requestNotificationPermission()">Listen for Meditation Gong</div>

    <script>
        const TOPIC_NAME = "quantum_sangha_groupie"; 
        const statusText = document.getElementById('status');
        let isListening = false;

        // Auto-start if permission was previously granted
        if (Notification.permission === 'granted') {
            startListening();
        }

        async function requestNotificationPermission() {
            if (Notification.permission !== 'granted') {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    startListening();
                } else {
                    statusText.innerText = "Notification Permission Denied";
                    statusText.style.color = "#ff3333";
                }
            }
        }

        function startListening() {
            if (isListening) return;
            isListening = true;
            
            statusText.innerText = "Listen for Meditation Gong";
            statusText.classList.remove('active');

            // Establish the live subscription stream to ntfy.sh
            const eventSource = new EventSource(`https://ntfy.sh/${TOPIC_NAME}/sse`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // 1. Fire the browser push notification
                new Notification(data.title || "Quantum Mindstream", {
                    body: data.message || "🔔 We meditate.",
                    icon: 'https://cdn-icons-png.flaticon.com/512/3663/3663335.png'
                });

                // 2. Visual feedback flash: Turn bright green for 5 seconds
                statusText.innerText = "Bell Rung";
                statusText.classList.add('active');

                // 3. Reset back to original message after 5000 milliseconds
                setTimeout(() => {
                    statusText.innerText = "Listen for Meditation Gong";
                    statusText.classList.remove('active');
                }, 5000);
            };

            eventSource.onerror = () => {
                // If network drops, gracefully try reconnecting in the background
                console.log("Reconnecting to quantum mindstream...");
            };
        }
    </script>
</body>
</html>
