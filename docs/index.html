<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quantum Gong</title>
    <link rel="manifest" href="manifest.json?v=13">
    <style>
        body { 
            background: gold; 
            color: #111111; 
            font-family: monospace; 
            text-align: center; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        h1 { 
            font-size: 22px; 
            text-shadow: 0 0 1px rgba(0,0,0,0.2); 
            margin: 0 0 30px 0; 
            color: #111111; 
        }
        .btn { 
            font-size: 1.3rem; 
            color: blue; 
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            padding: 15px 30px;
            border: 2px solid #111111; 
            border-radius: 4px;
            user-select: none;
            max-width: 80%;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.3); 
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .btn.locked {
            color: #006633;
            border-color: #006633;
            background: #ccffdd;
            cursor: not-allowed;
        }
        /* iOS Instruction Modal Overlay */
        #iosModal {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid black;
            width: 85%;
            box-shadow: 0 0 20px black;
            z-index: 999;
            text-align: left;
        }
        #iosModal h3 { margin: 0 0 10px 0; color: gold; text-align: center; }
        #iosModal button { 
            background: red; color: white; border: none; padding: 5px 10px; border-radius: 4px; float: right; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>⚛️ QUANTUM GONG ⚛️</h1>
    
    <div id="status" class="btn" onclick="handleInstallAction()">Detecting Status...</div>

    <div id="iosModal">
        <button onclick="closeIosModal()">X</button>
        <h3>iPhone Installation</h3>
        <p>1. Tap the <strong>Share</strong> button at the bottom of Safari (the square with an up arrow).</p>
        <p>2. Scroll down and select <strong>"Add to Home Screen"</strong>.</p>
    </div>

    <script>
        let deferredPrompt;
        let appInstalledDetermined = false;
        let isListening = false;
        let swRegistration = null;
        const statusText = document.getElementById('status');
        const iosModal = document.getElementById('iosModal');

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        const TOPIC_NAME = "quantum_sangha_groupie";

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js?v=13').then(reg => {
                swRegistration = reg;
            });
          });
        }

        window.addEventListener('appinstalled', () => {
            appInstalledDetermined = true;
            lockBrowserInterface();
        });

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            if (!isStandalone && !appInstalledDetermined) {
                statusText.innerText = "Install Android App";
                statusText.style.color = "#0044cc";
                statusText.style.borderColor = "#111111";
                statusText.classList.remove('locked');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (isStandalone) {
                statusText.innerText = "Tap to Connect & Listen";
                statusText.style.color = "blue";
                statusText.style.borderColor = "#111111";
            } else {
                setTimeout(() => {
                    if (isIOS) {
                        statusText.innerText = "Add to Home Screen (iOS)";
                        statusText.style.color = "blue";
                        statusText.style.borderColor = "#111111";
                    } else if (!deferredPrompt) {
                        lockBrowserInterface();
                    }
                }, 800); 
            }
        });

        function lockBrowserInterface() {
            statusText.innerText = "App Already Installed. Check Home Screen.";
            statusText.classList.add('locked');
            statusText.style.color = "green";
            statusText.style.borderColor = "#006633";
        }

        async function handleInstallAction() {
            if (isStandalone && !isListening) {
                // Prime the local web audio pipeline
                const primeAudio = new Audio('./gong.mp3');
                primeAudio.play().then(() => {
                    primeAudio.pause();
                    startListening(); 
                }).catch(e => console.log("Audio prime failure:", e));
                return;
            }

            if (statusText.classList.contains('locked') || isStandalone) {
                return;
            }

            if (isIOS) {
                iosModal.style.display = "block";
            } else if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                if (outcome === 'accepted') {
                    lockBrowserInterface();
                }
            }
        }

        function closeIosModal() {
            iosModal.style.display = "none";
        }

        async function startListening() {
            isListening = true;
            statusText.innerText = "Listening for Mindfulness Gong";
            statusText.style.color = "mediumvioletred";
            statusText.style.borderColor = "#006611";

            // Establish background handshake linking ntfy.sh directly to the worker
            if (swRegistration) {
                try {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        // Public key provided by ntfy.sh for browser generation delivery mapping
                        const ntfyPublicKey = 'BIEg7gN6gT9Ror5p0SAn00w7f_q_D88z_3ZzK5H12O1S_TDksI6gO1V6g-N1SIml874S_A8q_fSAs_A6gO1V6g';
                        const convertedKey = urlBase64ToUint8Array(ntfyPublicKey);

                        const subscription = await swRegistration.pushManager.subscribe({
                            userVisibleOnly: true,
                            applicationServerKey: convertedKey
                        });

                        await fetch(`https://ntfy.sh/${TOPIC_NAME}/webpush`, {
                            method: 'POST',
                            body: JSON.stringify(subscription),
                            headers: { 'Content-Type': 'application/json' }
                        });
                        console.log("Background channel successfully established.");
                    }
                } catch (err) {
                    console.log("Background engine setup skip/fail:", err);
                }
            }

            // Foreground SSE fall-back path
            const eventSource = new EventSource(`https://ntfy.sh/${TOPIC_NAME}/sse`);
            eventSource.onmessage = () => {
                triggerGongUI();
            };
        }

        function triggerGongUI() {
            statusText.innerText = "Bell Rung";
            statusText.style.color = "black";
            statusText.style.borderColor = "#6600cc";

            setTimeout(() => {
                statusText.innerText = "Listening for Mindfulness Gong";
                statusText.style.color = "mediumvioletred";
                statusText.style.borderColor = "#006611";
            }, 5000);
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
    </script>
</body>
</html>
