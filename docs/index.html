<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Sangha</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: gold; 
            color: black; 
            font-family: monospace; 
            text-align: center; 
            padding-top: 30vh; 
            margin: 0; 
        }
        h1 { 
            font-size: 22px; 
            text-shadow: 0 0 10px black; 
            margin-bottom: 30px;
        }
        #status { 
            font-size: 1.3rem; 
            color: palevioletred; 
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            padding: 15px 30px;
            border: 1px solid cyan;
            border-radius: 4px;
            user-select: none;
            max-width: 80%;
            line-height: 1.6;
        }
        #status:hover {
            border-color: #00ff99;
            color: #00ff99;
        }
        #status.active {
            color: #00ff99;
            text-shadow: 0 0 10px #00ff99;
            border-color: #00ff99;
            background: #1a3322;
        }
    </style>
</head>
<body>

    <h1>⚛️ QUANTUM SANGHA ⚛️</h1>
    
    <div id="status" onclick="requestNotificationPermission()">Tap to Connect & Listen</div>

    <script>
        const TOPIC_NAME = "quantum_sangha_groupie"; 
        const statusText = document.getElementById('status');
        let isListening = false;

        // Auto-start loop if permissions were established previously
        if ("Notification" in window && Notification.permission === 'granted') {
            startListening();
        }

        async function requestNotificationPermission() {
            // iOS Fallback Check: Native Safari blocks the 'Notification' object completely
            if (!("Notification" in window)) {
                statusText.innerText = "iOS detected: Tap Share ➔ 'Add to Home Screen' to launch as an app and activate alerts.";
                statusText.style.color = "mediumvioletred";
                statusText.style.borderColor = "#ffcc00";
                return;
            }

            if (Notification.permission !== 'granted') {
                statusText.innerText = "Requesting Permission...";
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    startListening();
                } else {
                    statusText.innerText = "Permission Denied (Reset Browser Site Settings)";
                    statusText.style.color = "red";
                    statusText.style.borderColor = "#ff3333";
                }
            } else {
                startListening();
            }
        }

        function startListening() {
            if (isListening) return;
            isListening = true;
            
            statusText.innerText = "Listen for the MINDFULNESS Gong";
            statusText.style.color = "palevioletred";
            statusText.style.borderColor = "#333";
            statusText.classList.remove('active');

            // Establish direct SSE streaming pipeline to ntfy network
            const eventSource = new EventSource(`https://ntfy.sh/${TOPIC_NAME}/sse`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // Fire native notification payload
                new Notification(data.title || "Quantum Sangha", {
                    body: data.message || "🔔 Time to meditate.",
                    icon: 'https://cdn-icons-png.flaticon.com/512/3663/3663335.png'
                });

                // Flash state layout: Bright green active phase
                statusText.innerText = "Bell Rung";
                statusText.classList.add('active');

                // Revert state machine precisely back after 5 seconds
                setTimeout(() => {
                    statusText.innerText = "Listen for Meditation Gong";
                    statusText.classList.remove('active');
                }, 5000);
            };

            eventSource.onerror = () => {
                console.log("Reconnecting to quantum sync stream...");
            };
        }
    </script>
</body>
</html>
