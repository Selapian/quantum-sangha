<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quantum Gong</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
    <link rel="manifest" href="manifest.json?v=20">
    <style>
        body { background: gold; color: #111111; font-family: monospace; text-align: center; margin: 0; height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .btn { font-size: 1.3rem; color: blue; cursor: pointer; padding: 15px 30px; border: 2px solid #111111; border-radius: 4px; background: rgba(255, 255, 255, 0.3); }
        .btn.locked { color: green; border-color: green; background: #ccffdd; }
    </style>
</head>
<body>
    <h1>⚛️ QUANTUM GONG ⚛️</h1>
    <div id="status" class="btn" onclick="handleInstallAction()">Loading...</div>

    <script>
        // 1. FILL THIS FROM FIREBASE CONSOLE (Project Settings -> General)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "YOUR_PROJECT_ID",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        let deferredPrompt, isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        const statusText = document.getElementById('status');
        const TOPIC_NAME = "quantum_sangha_groupie";

        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

        async function handleInstallAction() {
            if (isStandalone) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') startListening();
                else statusText.innerText = "Permission Denied";
            } else if (deferredPrompt) {
                deferredPrompt.prompt();
            }
        }

        async function startListening() {
            statusText.innerText = "Connecting...";
            try {
                // Get token via SDK
                const token = await messaging.getToken({ vapidKey: 'YOUR_PUBLIC_VAPID_KEY' });
                
                // Call your Val.Town proxy
                const response = await fetch("https://YOUR_VAL_TOWN_USERNAME-subscribe_topic.web.val.run", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, topic: TOPIC_NAME })
                });

                if (response.ok) {
                    statusText.innerText = "Connected to Quantum Sangha";
                    statusText.classList.add('locked');
                } else {
                    throw new Error("Bridge failed");
                }
            } catch (err) {
                console.error(err);
                statusText.innerText = "Connection Failed";
            }
        }
    </script>
</body>
</html>
