<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quantum Gong</title>
    <link rel="manifest" href="manifest.json?v=20">
    <style>
        body { background: gold; color: #111111; font-family: monospace; text-align: center; margin: 0; height: 100vh; width: 100vw; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        h1 { font-size: 22px; text-shadow: 0 0 1px rgba(0,0,0,0.2); margin: 0 0 30px 0; color: #111111; }
        .btn { font-size: 1.3rem; color: blue; transition: all 0.3s ease; cursor: pointer; display: inline-block; padding: 15px 30px; border: 2px solid #111111; border-radius: 4px; user-select: none; max-width: 80%; line-height: 1.6; background: rgba(255, 255, 255, 0.3); }
        .btn:hover { background: rgba(255, 255, 255, 0.5); }
        .btn.locked { color: #006633; border-color: #006633; background: #ccffdd; cursor: not-allowed; }
        #iosModal { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 20px; border-radius: 12px; border: 2px solid black; width: 85%; box-shadow: 0 0 20px black; z-index: 999; text-align: left; }
        #iosModal h3 { margin: 0 0 10px 0; color: gold; text-align: center; }
        #iosModal button { background: red; color: white; border: none; padding: 5px 10px; border-radius: 4px; float: right; cursor: pointer; }
    </style>
</head>
<body>

    <h1>⚛️ QUANTUM GONG ⚛️</h1>
    <div id="status" class="btn" onclick="handleInstallAction()">Detecting Status...</div>

    <div id="iosModal">
        <button onclick="closeIosModal()">X</button>
        <h3>iPhone Installation</h3>
        <p>1. Tap the <strong>Share</strong> button at the bottom of Safari.</p>
        <p>2. Select <strong>"Add to Home Screen"</strong>.</p>
    </div>

    <script>
        let deferredPrompt, appInstalledDetermined = false, isListening = false, swRegistration = null;
        const statusText = document.getElementById('status'), iosModal = document.getElementById('iosModal');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        const TOPIC_NAME = "quantum_sangha_groupie";

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js?v=22').then(reg => { swRegistration = reg; });
          });
        }

        window.addEventListener('appinstalled', () => { appInstalledDetermined = true; lockBrowserInterface(); });
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            if (!isStandalone && !appInstalledDetermined) {
                statusText.innerText = "Install Android App"; statusText.style.color = "#0044cc"; statusText.style.borderColor = "#111111"; statusText.classList.remove('locked');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (isStandalone) {
                statusText.innerText = "Tap to Connect & Listen"; statusText.style.color = "blue"; statusText.style.borderColor = "#111111";
            } else {
                setTimeout(() => {
                    if (isIOS) {
                        statusText.innerText = "Add to Home Screen (iOS)"; statusText.style.color = "blue"; statusText.style.borderColor = "#111111";
                    } else if (!deferredPrompt && !isStandalone) { lockBrowserInterface(); }
                }, 1200); 
            }
        });

        function lockBrowserInterface() {
            statusText.innerText = "App Already Installed. Check Home Screen."; statusText.classList.add('locked'); statusText.style.color = "green"; statusText.style.borderColor = "#006633";
        }

        async function handleInstallAction() {
            if (isStandalone && !isListening) {
                // 1. Request permission IMMEDIATELY inside the click handler to satisfy the user-gesture rule
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    startListening();
                } else {
                    statusText.innerText = "Permission Denied";
                    statusText.style.color = "red";
                }
                return;
            }

            if (statusText.classList.contains('locked') || isStandalone) return;
            if (isIOS) { iosModal.style.display = "block"; } 
            else if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice; deferredPrompt = null;
                if (outcome === 'accepted') { lockBrowserInterface(); }
            }
        }

        function closeIosModal() { iosModal.style.display = "none"; }

       async function startListening() {
            isListening = true;
            statusText.innerText = "Listening for Mindfulness Gong";
            statusText.style.color = "mediumvioletred";
            statusText.style.borderColor = "#006611";
        
            if (swRegistration) {
                try {
                    const myFirebasePublicKey = 'BOFZKCCCIb-VDBJBa7TZX-DH_LVEHOVl1X7QMmWzaZhOE7hyzkrIcZME1rXRW1r-TWGCBVytxz1ZchxMp82h1ok';
                    
                    const subscription = await swRegistration.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(myFirebasePublicKey)
                    });
        
                    // Extract the clean token string
                    const cleanToken = subscription.endpoint.split('/fcm/send/')[1];
                    
                    // SILENT ANONYMOUS SUBSCRIBE: Register this anonymous device directly to your shared topic name
                    // No database, no storage, no tracking.
                    await fetch(`https://iid.googleapis.com/v1/iid/info/${cleanToken}/rel/topics/${TOPIC_NAME}`, {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + 'YOUR_PUBLIC_VAPID_OR_PROJECT_CONTEXT' // We will simplify this via a direct FCM web hook
                        }
                    });
                    
                    statusText.innerText = "Connected to Quantum Sangha";
                    statusText.style.color = "green";
                } catch (err) { 
                    console.log("FCM Topic connection fail:", err); 
                }
            }
        }
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // Add this inside the script tag of index.html to catch background thread audio requests
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.command === "play_gong") {
            const audio = new Audio('./gong.mp3');
            audio.crossOrigin = "anonymous";
            audio.play().catch(err => console.log("Audio play blocked by context:", err));
        }
    });
}
    </script>
</body>
</html>
