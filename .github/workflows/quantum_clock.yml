name: Quantum Clock Loop

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering

# FIXED: Grants the workflow permission to commit changes back to your repo
permissions:
  contents: write

jobs:
  run-quantum-gong:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '20'

      - name: Query Qubit & Trigger Gong
        run: node trigger.js

      # FIXED: Automatically makes a dummy commit to reset the 60-day hibernation timer
      - name: Keep workflow alive
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Loop synchronization ping (Reset 60-day hibernation)"
          git push
